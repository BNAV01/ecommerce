name: backend-build-test

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-build.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build backend
        run: mvn -f backend/pom.xml clean verify
