services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PRODUCT_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start-dev", "--http-port=8181", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8181"
    volumes:
      - ./keycloak/realm-ecommerce.json:/opt/keycloak/data/import/realm-ecommerce.json

  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "${MAIL_UI_PORT}:8025"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "${TEMPO_PORT}:3110"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml
      - tempo_data:/tmp/tempo

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  product-service:
    build:
      context: ../../
      dockerfile: backend/product-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      PRODUCT_SERVICE_PORT: 8080
      PRODUCT_DB_URL: jdbc:mysql://mysql:3306/${PRODUCT_DB}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      TOPIC_PRODUCT_CREATED: ${TOPIC_PRODUCT_CREATED}
      TOPIC_PRODUCT_UPDATED: ${TOPIC_PRODUCT_UPDATED}
      TOPIC_SKU_UPDATED: ${TOPIC_SKU_UPDATED}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started

  order-service:
    build:
      context: ../../
      dockerfile: backend/order-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ORDER_SERVICE_PORT: 8081
      ORDER_DB_URL: jdbc:mysql://mysql:3306/${ORDER_DB}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      TOPIC_ORDER_CREATED: ${TOPIC_ORDER_CREATED}
      TOPIC_ORDER_CONFIRMED: ${TOPIC_ORDER_CONFIRMED}
      TOPIC_ORDER_CANCELLED: ${TOPIC_ORDER_CANCELLED}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started

  inventory-service:
    build:
      context: ../../
      dockerfile: backend/inventory-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      INVENTORY_SERVICE_PORT: 8082
      INVENTORY_DB_URL: jdbc:mysql://mysql:3306/${INVENTORY_DB}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      TOPIC_INVENTORY_STOCK_RESERVED: ${TOPIC_INVENTORY_STOCK_RESERVED}
      TOPIC_INVENTORY_STOCK_REJECTED: ${TOPIC_INVENTORY_STOCK_REJECTED}
      TOPIC_INVENTORY_STOCK_RELEASED: ${TOPIC_INVENTORY_STOCK_RELEASED}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started

  notification-service:
    build:
      context: ../../
      dockerfile: backend/notification-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      NOTIFICATION_SERVICE_PORT: 8083
      NOTIFICATION_DB_URL: jdbc:mysql://mysql:3306/${NOTIFICATION_DB}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      TOPIC_ORDER_CONFIRMED: ${TOPIC_ORDER_CONFIRMED}
      TOPIC_ORDER_CANCELLED: ${TOPIC_ORDER_CANCELLED}
      TOPIC_INVENTORY_STOCK_REJECTED: ${TOPIC_INVENTORY_STOCK_REJECTED}
      TOPIC_NOTIFICATION_EMAIL_REQUESTED: ${TOPIC_NOTIFICATION_EMAIL_REQUESTED}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      mailpit:
        condition: service_started

  api-gateway:
    build:
      context: ../../
      dockerfile: backend/api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      GATEWAY_PORT: 9000
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      SHOP_ORIGIN: ${SHOP_ORIGIN}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN}
      PRODUCT_SERVICE_URL: http://product-service:8080
      ORDER_SERVICE_URL: http://order-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
    ports:
      - "${GATEWAY_PORT}:9000"
    depends_on:
      - product-service
      - order-service
      - inventory-service
      - notification-service

volumes:
  mysql_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
