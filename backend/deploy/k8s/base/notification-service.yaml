apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/your-org/ecommerce/notification-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: SPRING_PROFILES_ACTIVE
            - name: NOTIFICATION_DB_URL
              value: jdbc:mysql://mysql:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MYSQL_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: KEYCLOAK_ISSUER_URI
            - name: MAIL_HOST
              value: mailpit
            - name: MAIL_PORT
              value: "1025"
            - name: TOPIC_ORDER_CONFIRMED
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: TOPIC_ORDER_CONFIRMED
            - name: TOPIC_ORDER_CANCELLED
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: TOPIC_ORDER_CANCELLED
            - name: TOPIC_INVENTORY_STOCK_REJECTED
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: TOPIC_INVENTORY_STOCK_REJECTED
            - name: TOPIC_NOTIFICATION_EMAIL_REQUESTED
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: TOPIC_NOTIFICATION_EMAIL_REQUESTED
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ecommerce
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083
