server:
  port: ${INVENTORY_SERVICE_PORT:8082}

spring:
  application:
    name: inventory-service
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:mysql://mysql:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:ecommerce}
    password: ${MYSQL_PASSWORD:ecommerce}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8181/realms/ecommerce}

app:
  outbox:
    publisher-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:5000}
  kafka:
    topics:
      stock-reserved: ${TOPIC_INVENTORY_STOCK_RESERVED:inventory.stock-reserved}
      stock-rejected: ${TOPIC_INVENTORY_STOCK_REJECTED:inventory.stock-rejected}
      stock-released: ${TOPIC_INVENTORY_STOCK_RELEASED:inventory.stock-released}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
