server:
  port: ${ORDER_SERVICE_PORT:8081}

spring:
  application:
    name: order-service
  datasource:
    url: ${ORDER_DB_URL:jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:ecommerce}
    password: ${MYSQL_PASSWORD:ecommerce}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8181/realms/ecommerce}

app:
  inventory:
    base-url: ${INVENTORY_SERVICE_URL:http://inventory-service:8082}
  outbox:
    publisher-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:5000}
  kafka:
    topics:
      order-created: ${TOPIC_ORDER_CREATED:order.created}
      order-confirmed: ${TOPIC_ORDER_CONFIRMED:order.confirmed}
      order-cancelled: ${TOPIC_ORDER_CANCELLED:order.cancelled}

resilience4j:
  circuitbreaker:
    instances:
      inventoryReserve:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 30s
        failureRateThreshold: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
