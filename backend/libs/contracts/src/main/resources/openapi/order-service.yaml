openapi: 3.0.3
info:
  title: Order Service API
  version: 1.0.0
servers:
  - url: /api
paths:
  /orders:
    get:
      summary: List orders
      responses:
        '200':
          description: OK
    post:
      summary: Create order
      responses:
        '201':
          description: Created
  /orders/{id}:
    get:
      summary: Get order
      responses:
        '200':
          description: OK
  /orders/{id}/confirm:
    post:
      summary: Confirm order
      responses:
        '200':
          description: Confirmed
  /orders/{id}/cancel:
    post:
      summary: Cancel order
      responses:
        '200':
          description: Cancelled
