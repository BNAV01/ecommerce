<main class="admin-shell">
  <section class="hero">
    <p class="tag">Platform Admin</p>
    <h1>{{ title }}</h1>
    <p class="subtitle">
      Control plane for ecommerce microservices behind API Gateway and Keycloak.
    </p>

    <div class="meta-grid">
      <article>
        <h2>Gateway</h2>
        <p>{{ gatewayEndpoint }}</p>
      </article>
      <article>
        <h2>Required role</h2>
        <p>{{ requiredRoles }}</p>
      </article>
      <article>
        <h2>Auth endpoint</h2>
        <p>{{ authEndpoint }}</p>
      </article>
    </div>
  </section>

  <section class="modules">
    <article class="module-card" *ngFor="let item of modules">
      <h3>{{ item.name }}</h3>
      <p>{{ item.scope }}</p>
      <code>{{ item.endpoint }}</code>
    </article>
  </section>
</main>

<router-outlet />
